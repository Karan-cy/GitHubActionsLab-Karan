name: Workflow 2 - Multi Platform

on:	
  pull_request:
    branches: [ "master" ]

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: uname -a
      - run: echo "Hello from Ubuntu" > os.txt
      - run: cat os.txt

  windows-job:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: systeminfo
      - run: echo Hello from Windows > os.txt
      - run: type os.txt

  macos-job:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: uname -a
      - run: echo "Hello from macOS" > os.txt
      - run: cat os.txt
